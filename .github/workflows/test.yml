on: [push]

jobs:
  test-action:
    runs-on: ubuntu-latest
    name: Test pitest report action
    strategy:
      matrix:
        node-version: ["24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Load cached node modules
        id: cached-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ matrix.node-version }}-{{ hashFiles('package-lock.json) }}
      - name: Install dependencies
        if: steps.cached-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Run all tests
        run: npm test
      - name: Check dist is up to date
        run: |
          npm run package
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "dist/ is out of date. Run 'npm run package' and commit the result."
            git diff dist/
            exit 1
          fi